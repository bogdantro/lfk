{% extends 'core/base.html' %}
{% load static %}

{% block head %}

<title>Seniorlag | Lillehammer FK Herrer og Kvinner</title>

<meta name="description" content="Se seniorlagene til Lillehammer FK. Finn informasjon om herrelaget og kvinnelaget, spillere og kamper.">

<meta name="robots" content="index, follow">
<meta name="author" content="Lillehammer Fotballklubb">
<meta name="keywords" content="Lillehammer FK senior, seniorlag Lillehammer FK, fotball herrer kvinner Lillehammer, A-lag Lillehammer FK">

<link rel="canonical" href="{{ request.build_absolute_uri }}">

<!-- Open Graph -->
<meta property="og:title" content="Seniorlag | Lillehammer FK">
<meta property="og:description" content="Herrer og kvinner – seniorlagene i Lillehammer FK">
<meta property="og:image" content="{% static 'images/covers/senior-herrer.jpeg' %}">
<meta property="og:url" content="{{ request.build_absolute_uri }}">
<meta property="og:type" content="website">
<meta property="og:locale" content="nb_NO">

<!-- Twitter -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Seniorlag Lillehammer FK">
<meta name="twitter:description" content="Se herre- og kvinnelagene">
<meta name="twitter:image" content="{% static 'images/covers/senior-herrer.jpeg' %}">

<!-- Geo -->
<meta name="geo.region" content="NO-IN">
<meta name="geo.placename" content="Lillehammer">
<meta name="geo.position" content="61.1153;10.4662">
<meta name="ICBM" content="61.1153, 10.4662">

<!-- Structured Data: Organization -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "SportsOrganization",
  "name": "Lillehammer Fotballklubb",
  "url": "{{ request.build_absolute_uri }}",
  "logo": "{% static 'images/logo/logo-8.png' %}"
}
</script>

<!-- Breadcrumb -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BreadcrumbList",
  "itemListElement": [
    {
      "@type": "ListItem",
      "position": 1,
      "name": "Hjem",
      "item": "/"
    },
    {
      "@type": "ListItem",
      "position": 2,
      "name": "Seniorlag",
      "item": "{{ request.build_absolute_uri }}"
    }
  ]
}
</script>

{% endblock %}

{% block content %}
<link rel="stylesheet" href="{% static '/scss/pages/teams/senior.css' %}" type="text/css">
<link rel="stylesheet" href="{% static '/scss/global/global.css' %}" type="text/css">
<script src="{% static '/js/home.js' %}"></script>



<!-- <div id="startOverlay"></div> -->
<section class="cover" >
    <div class="content">
        
        <div class="left" onclick="window.location.href='/lag/senior/herrer/'">
        <div class="overlay" onclick="window.location.href='/lag/senior/herrer/'"></div>
        <img src="{% static 'images/other/senior3.jpeg' %}" alt="" class="no-hover" onclick="window.location.href='/lag/senior/herrer/'">
        <img src="{% static 'images/covers/senior-herrer.jpeg' %}" alt="" class="hover" onclick="window.location.href='/lag/senior/herrer/'">
        <div class="text"><h1>Herrer</h1></div>
    </div>
    
    <div class="right" onclick="window.location.href='/lag/senior/kvinner/'">
            <div class="overlay" onclick="window.location.href='/lag/senior/kvinner/'"></div>
            <img src="{% static 'images/covers/kvinner.jpeg' %}" alt="" class="no-hover" onclick="window.location.href='/lag/senior/kvinner/'">
            <img src="{% static 'images/other/kvinner3.jpeg' %}" alt="" class="hover" onclick="window.location.href='/lag/senior/kvinner/'">
            <div class="text"><h1>kvinner</h1></div>
    </div>
 
  </div>
</section>



{% endblock %}
