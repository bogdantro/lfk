{% load static %}

<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SportsOrganization",
      "name": "Lillehammer Fotballklubb",
      "url": "{{ request.build_absolute_uri|slice:':-1' }}",
      "logo": "{% static 'images/other/cover-sponsor1.png' %}"
    }
    </script>

    <!-- Django SEO extension point -->
    {% block head %}{% endblock %}

    <base href="/">

    <!-- CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css">
    <link rel="stylesheet" href="{% static '/scss/global/global.css' %}" type="text/css">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

    <!-- Favicons (fixed paths for SEO) -->
    <link rel="icon" type="image/png" sizes="32x32" href="{% static 'images/favicon/favicon-32x32.png' %}">
    <link rel="icon" type="image/png" sizes="16x16" href="{% static 'images/favicon/favicon-16x16.png' %}">
    <link rel="apple-touch-icon" sizes="180x180" href="{% static 'images/favicon/apple-touch-icon.png' %}">
    <link rel="manifest" href="{% static 'images/favicon/site.webmanifest' %}">
    <link rel="shortcut icon" href="{% static 'images/favicon/favicon.ico' %}">

    <!-- JS (deferred for performance) -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js" defer></script>
    <script src="{% static '/js/home.js' %}" defer></script>
    <script src="https://kit.fontawesome.com/5153798d69.js" crossorigin="anonymous" defer></script>

</head>

<body ontouchstart="">
    <header>
        {% include 'core/nav.html' %}
    </header>
    
    {% block content %}
    {% endblock %}

    <footer>
        {% include 'core/footer.html' %}
    </footer>

<!-- Back to top button -->
<button
  id="backToTop"
  class="back-to-top"
  type="button"
  aria-label="Back to top"
  title="Back to top"
>
  <i class="fa-solid fa-arrow-up"></i>
</button>

<script>
  (function () {
    const btn = document.getElementById("backToTop");
    if (!btn) return;

    const showAfter = 350;

    function toggle() {
      if (window.scrollY > showAfter) btn.classList.add("is-visible");
      else btn.classList.remove("is-visible");
    }

    window.addEventListener("scroll", toggle, { passive: true });
    toggle();

    btn.addEventListener("click", function () {
      window.scrollTo({ top: 0, behavior: "smooth" });
    });
  })();
</script>

</body>
</html>
